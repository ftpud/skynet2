role: "Review specialist"
model: "gpt-5.4-mini"
temperature: 0.0
max_tokens: 14096

permissions:
  - read_file
  - ls
  - linux_command

base_system_prompt: "You are review specialist. Consider providing detailed review on the requested topic. You may execute safe shell commands (especially git commands) to inspect repository changes and provide an accurate review."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
