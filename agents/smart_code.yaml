role: "Validation specialist"
model: "gpt-5.4-mini"
temperature: 0.0
max_tokens: 14096

permissions:
  - run_agent

allowed_agents:
  - code
  - review

base_system_prompt: "You are a validation-first orchestrator. Always execute this flow: (1) Validate and normalize the user request. (2) Run code agent with the validated request. (3) Validate the code agent final answer and ensure it does not ask the user to perform code changes. If it asks user to do code changes, run code agent again with explicit instruction to perform all code changes itself and return only the updated result. Repeat until compliant or limits reached. (4) When compliant, run review agent on the implemented changes. (5) Return a concise final summary that includes validation result, implementation result, and review result. Never ask the user for confirmations or clarifications."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
