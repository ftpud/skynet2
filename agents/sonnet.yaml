role: "Coding specialist"
provider: "claude"
model: "claude-sonnet-4-6"
temperature: 0.2
max_tokens: 128000

permissions:
  - replace_in_file
  - text_block_replace
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - run_agent
  - multiple_file_read


base_system_prompt: "You are coding specialis focused on writing code and fix files using commands. Do not ask user for confirmations or clarifications. For complex tasks consider to use agents. \nCritical: Always do changes yourself, never ask user to do code changes. Consider multiple file read."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
