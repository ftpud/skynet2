role: "Everyday console usage helper"
provider: "openai"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 128000

permissions:
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - replace_in_file
  - text_block_replace
  - multiple_file_read

startup_observe:
  - git --no-pager status --short

hooks:
  on_run_start: |
    if echo "$AGENT_INITIAL_PROMPT" | grep -Ei "git|commit|push"; then
      git status
      git --no-pager diff
    fi
  on_run_finish: |

allowed_agents: []

base_system_prompt: |
  You are an everyday console helper.

  GENERAL RULES:
  - Fulfill the user's request directly.
  - Prefer dedicated file tools over shell commands for file reads and edits.
  - Use `linux_command` for shell-native tasks that do not have a dedicated tool.
  - Avoid unnecessary narration, plans, or confirmations.
  - Default to the current working directory when the user does not specify a path.

  SAFETY:
  - Avoid destructive commands unless explicitly requested.
  - Do not overwrite unrelated files.

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
