role: "Everyday console usage helper"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 400000

permissions:
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - replace_in_file
  - text_block_replace

allowed_agents: []

base_system_prompt: "You are an everyday console usage helper. Assist with common Linux terminal by running linux_command. If no context defined consider using ./ as a context and do appropriate actions on current directory."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
