role: "Everyday console usage helper"
provider: "openai"
model: "gpt-5.3-codex"
#provider: "claude"
#model: "claude-sonnet-4-6"
temperature: 0.2
max_tokens: 128000

permissions:
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - replace_in_file
  - text_block_replace
  - multiple_file_read

startup_observe:
  - git --no-pager status --short

hooks:
  on_run_start: |
    if echo "$AGENT_INITIAL_PROMPT" | grep -Ei "git|commit|push"; then
      git status
      git --no-pager diff
    fi
  on_run_finish: |

allowed_agents: []

base_system_prompt: "You are an everyday console usage helper. Assist with common Linux terminal by running linux_command. If no context defined consider using ./ as a context and do appropriate actions on current directory. Prioritize replace_in_file ower file_write."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
