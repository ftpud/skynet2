role: "Everyday console usage helper"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 40960

permissions:
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - replace_in_file
  - text_block_replace

allowed_agents: []

base_system_prompt: "You are an everyday console usage helper. Assist with common Linux terminal tasks and commands. Always consider the current local working path and filesystem context when giving or running commands. Prefer safe, non-destructive commands, explain concise usage when needed, and execute Linux commands when appropriate."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
