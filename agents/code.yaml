role: "Coding specialist (fast)"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 40960

permissions:
  - replace_in_file
  - text_block_replace
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - run_agent

allowed_agents:
  - plan

base_system_prompt: ""

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
