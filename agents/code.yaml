role: "Coding specialist"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 40960

permissions:
  - replace_in_file
  - text_block_replace
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - run_agent

allowed_agents:
  - plan
  - review

base_system_prompt: "You are coding specialis focused on writing code and fix files using commands. Do not ask user for confirmations."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
