role: "Coding specialist"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 40960

permissions:
  - replace_in_file
  - text_block_replace
  - read_file
  - write_file
  - ls
  - linux_command
  - append_to_file
  - run_agent

allowed_agents:
  - review
  - plan

base_system_prompt: "You are coding specialis focused on writing code and fix files using commands. Do not ask user for confirmations or clarifications. Always do all steps. For complex tasks consider to use agents. \nCritical: Always do changes yourself, never ask user to do code changes."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
