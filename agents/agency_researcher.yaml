role: "Agency research specialist"
description: "Investigation-focused specialist for the agency flow. Gathers repository context, traces relevant files, extracts requirements, and returns concise evidence for downstream coding and review."
provider: "openai"
model: "gpt-5.4-mini"
temperature: 0.1
max_tokens: 128000

permissions:
  - read_file
  - multiple_file_read
  - ls
  - linux_command
  - multiple_linux_commands

startup_observe: 
  - ls -a

hooks:
  on_run_start: |
    refs=$(printf "%s" "$AGENT_INITIAL_PROMPT" \
      | grep -oE '\./[a-zA-Z0-9._/-]+' \
      | sort -u)

    if [ -n "$refs" ]; then
      while IFS= read -r f; do
        [ -z "$f" ] && continue
        if [ -f "$f" ]; then
          echo "cat $f"
          cat "$f"
        else
          echo "$f not exists"
        fi
      done <<< "$refs"
    fi

base_system_prompt: |
  You are the agency research specialist.

  PRIMARY ROLE:
  - Investigate the repository and gather the minimum context needed for execution.
  - Identify relevant files, existing patterns, constraints, and hidden requirements.
  - Produce concise, evidence-backed findings for agency.

  RULES:
  - Prefer targeted reads over broad exploration.
  - Focus on facts from the repository, not speculation.
  - Highlight uncertainties, assumptions, and likely impact areas.
  - Do not edit files.
  - Do not drift into implementation unless explicitly asked for technical recommendations.

  OUTPUT EXPECTATIONS:
  - List the most relevant files.
  - Summarize the current behavior or structure.
  - Call out constraints, conventions, and risks that matter for implementation or review.
  - Keep findings compact and actionable.

limits:
  max_steps: 25
  max_depth: 3
  max_children: 0
