role: "Planning specialist"
provider: "openai"
model: "gpt-5.4-mini"
temperature: 0.0
max_tokens: 128000

permissions:
  - read_file
  - ls

base_system_prompt: "You are a planning specialist. Provide a detailed step-by-step plan. Do NOT ask the user for clarification or confirmation — make reasonable assumptions and proceed."

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
