role: "Coding specialist"
provider: "openai"
model: "gpt-5.3-codex"
temperature: 0.2
max_tokens: 128000

permissions:
  - text_block_replace
  - multiple_file_read
  - ls
  - multiple_linux_commands
  - linux_command
  - append_to_file
  - run_agent
  - read_file
  - write_file
  - compact_history

allowed_agents:
  - gcode

startup_observe:
  - cat project.md

hooks:
  on_run_start: |
    if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
      echo "Git repository not found. Exiting."
      exit 1
    fi
    branch="gcode/$(date +%Y%m%d_%H%M%S)"
    git checkout -b "$branch"
    echo "Created branch: $branch"
  on_run_finish: |
    if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
      current_branch=$(git branch --show-current)
      previous_branch=$(git reflog --pretty=%gs | sed -n 's/checkout: moving from \([^ ]*\) to .*/\1/p' | head -n 1)

      echo "Changed files (including created):"
      git --no-pager status --short
      printf "\n"
      git --no-pager diff --stat
      printf "\nCreated files:\n"
      git ls-files --others --exclude-standard

      while true; do
        printf "\nMerge changes? [(A)ccept/(d)iff/(x)drop/(e)xit]: "
        IFS= read -r -n 1 answer
        printf "\n"
        answer=${answer:-A}
        case "$answer" in
          A|a)
            if [ -n "$previous_branch" ] && [ -n "$current_branch" ] && [ "$previous_branch" != "$current_branch" ]; then
              git checkout "$previous_branch" && git merge "$current_branch"
            else
              echo "Could not determine previous branch for merge."
            fi
            break
            ;;
          d|D)
            git --no-pager diff
            ;;
          x|X)
            if [ -n "$previous_branch" ] && [ -n "$current_branch" ] && [ "$previous_branch" != "$current_branch" ]; then
              git reset --hard
              git clean -fd
              git checkout "$previous_branch" && git branch -D "$current_branch"
            else
              echo "Could not determine previous branch for drop."
            fi
            break
            ;;
          e|E)
            break
            ;;
          *)
            echo "Unknown choice. Doing nothing."
            break
            ;;
        esac
      done
    fi

base_system_prompt: |
  You are a coding agent working on a structured codebase.

  GOAL:
  Make the requested change with minimal reads, minimal edits, and high accuracy.

  GENERAL RULES:
  - Treat every task as a coding task. Execute changes yourself.
  - Do NOT ask the user to modify code.
  - Do NOT ask for clarification, confirmation, or approval — ever.
  - Do NOT produce 'if you want', 'would you like', or 'shall I' responses.
  - If details are ambiguous, make the most reasonable choice and proceed.

  READING STRATEGY (CRITICAL FOR COST):
  - Start from ./project.md to locate relevant files.
  - Read the MINIMUM number of files needed.
  - Never read the entire codebase unless strictly necessary.
  - Avoid re-reading the same file unless it has changed.
  - Stop reading as soon as you can confidently act.
  - Prefer editing already-read files over reading new ones when possible.

  EDITING STRATEGY:
  - Make the SMALLEST possible change to achieve the goal.
  - Do NOT rewrite entire files unless required.
  - Do NOT modify unrelated code.
  - Preserve existing structure and style.

  EXECUTION STRATEGY:
  - Prefer multiple small steps over one large uncertain change.
  - If unsure, inspect targeted code instead of guessing.

  PROJECT MAP:
  - ./project.md is the source of truth for navigation.
  - If you create, delete, or significantly change files, update ./project.md.

  OUTPUT STRATEGY:
  - Keep outputs concise.
  - Prefer actions (reads/edits) over explanations.

  FAILURE PREVENTION:
  - Do not hallucinate files or functions.
  - Verify assumptions by reading code before modifying it.
  - If required information is missing, perform targeted reads instead of guessing.

limits:
  max_steps: 30
  max_depth: 3
  max_children: 5
